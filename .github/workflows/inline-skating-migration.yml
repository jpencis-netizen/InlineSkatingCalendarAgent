name: Inline Skating Calendar Migration

on:
  #schedule:
  #  - cron: '0 2 * * *'  # Daily at 2 AM UTC
  
  workflow_dispatch:
    inputs:
      run_cleanup:
        description: 'Run cleanup of auto-generated events'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      run_migration:
        description: 'Run calendar migration (scan 2025 events)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
jobs:
  migrate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run migration script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CALENDAR_ID: ${{ secrets.CALENDAR_ID }}
          SERVICE_ACCOUNT_JSON_B64: ${{ secrets.SERVICE_ACCOUNT_JSON_B64 }}
          RUN_CLEANUP: ${{ github.event.inputs.run_cleanup || 'false' }}
          RUN_MIGRATION: ${{ github.event.inputs.run_migration || 'false' }}
        run: python -u scripts/skating_migration.py
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: migration-logs
          path: migration.log
          retention-days: 7
